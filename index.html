    <option value="PM">PM</option>
  </select>

  <label>Responsable</label>

    <option value="Eduanggi">Eduanggi</option>
    <option value="Patricia">Patricia</option>
    <option value="Sra.Natali">Sra.Natali</option>
  </select>

  <div class="separador">
    <div id="gastos"></div>

    <button class="add-btn" onclick="agregarGasto()">+ Agregar gasto</button>
  </div>
  

  <div class="separador">
    <div id="recaudos"></div>
    <button class="add-btn-2" onclick="agregarRecudo()">+ Agregar Recaudo</button>

  </div>
  
  <div class="separador">
    <div id="venta"></div>
    <button class="add-btn-3" onclick="agregarVenta()">+ Agregar venta tirilla</button>

  <div class="total">

  </div>

    Total recaudos: $<span id="total-recaudos">0</span>
  </div>

  </div>

let gastos = [];
let recaudos = [];

// 🔹 Fecha automática
function setFechaHoy() {
  const hoy = new Date().toISOString().split("T")[0];
  document.getElementById("fecha").value = hoy;
}

// 🔹 Agregar gasto
function agregarGasto() {
  if (gastos.length === 0 || (gastos[gastos.length - 1].proveedor && gastos[gastos.length - 1].concepto && gastos[gastos.length - 1].valor)) {
    gastos.push({ proveedor: "", concepto: "", valor: "" });
    render();
    guardarEnLocal(); 
  } else {
    alert("Por favor, completa el gasto actual antes de agregar uno nuevo.");
  }  
  
}

//🔹 Agregar un recudo
function agregarRecudo() {
  if (recaudos){
    renderRecudos();
    guardarEnLocal(); 
  } else {
    alert("Solo puede agregar esos recuados");
  }  
  
  
}
//Agregar una venta de tirilla
function agregarVenta() {
  ventas.push({ panaderia: "", cafeteria: "", tienda: "", otros: "" });
  renderVenta();
  guardarEnLocal(); 
}

// 🔹 Limpiar gasto
function limpiarGasto(index) {
  gastos[index] = { proveedor: "", concepto: "", valor: "" };
  render();
  guardarEnLocal(); 
}

// 🔹 Formato COP
function formatearCOP(valor) {
  return new Intl.NumberFormat('es-CO').format(valor);
}

// 🔹 Input moneda
function formatearInput(input, index) {
  let valor = input.value.replace(/\D/g, "");
  gastos[index].valor = valor;
  input.value = formatearCOP(valor);
  renderTotal();
  renderTotalVenta()
  guardarEnLocal(); 
}

// 🔹 Total
function calcularTotal() {
  return gastos.reduce((sum, g) => sum + (parseFloat(g.valor) || 0), 0);
}

function renderTotal() {
  document.getElementById("total").innerText = formatearCOP(calcularTotal());
}
// Cerrar todas las sugerencias
function cerrarTodasSugerencias() {
  document.querySelectorAll(".sugerencias").forEach(el => {
    el.innerHTML = "";
  });
}

// Detectar click fuera
document.addEventListener("click", function(e) {
  if (!e.target.closest(".autocomplete")) {
    cerrarTodasSugerencias();
  }
});
//Para evitar recomendaciones encimadas
function cerrarOtros(indexActual, tipoActual) {
  document.querySelectorAll(".sugerencias").forEach(el => {
    if (!el.id.includes(`${tipoActual}-${indexActual}`)) {
      el.innerHTML = "";
    }
  });
}

function mostrarTodasOpciones(input, index, tipo) {
  cerrarOtros(index, tipo);
  const lista = tipo === "proveedor" ? proveedores : conceptos;
  const contenedor = document.getElementById(`sug-${tipo}-${index}`);
  contenedor.innerHTML = "";

  lista.forEach(item => {
    const div = document.createElement("div");
    div.innerText = item;

    div.onclick = () => {
      gastos[index][tipo] = item;
      render();
      guardarEnLocal(); 
    };

    contenedor.appendChild(div);
  });
}
// 🔍 Autocomplete
function filtrarOpciones(input, index, tipo) {
  const valor = input.value.toLowerCase();
  const lista = tipo === "proveedor" ? proveedores : conceptos;

  const resultados = lista.filter(item =>
    item.toLowerCase().includes(valor)
  );

  const contenedor = document.getElementById(`sug-${tipo}-${index}`);
  contenedor.innerHTML = "";

  if (resultados.length === 0) {
    contenedor.innerHTML = "<div>No encontrado</div>";
    return;
  }

  resultados.forEach(item => {
    const div = document.createElement("div");
    div.innerText = item;

    div.onclick = () => {
      gastos[index][tipo] = item;
      render();
      guardarEnLocal(); 
    };

    contenedor.appendChild(div);
  });

  gastos[index][tipo] = input.value;
}

// 🔹 Render
function render() {
  const contenedor = document.getElementById("gastos");
  contenedor.innerHTML = "";

  gastos.forEach((gasto, index) => {
    contenedor.innerHTML += `
      <div class="gasto">
        <button class="delete-btn" onclick="eliminarGasto(${index})">✕</button>
        <div class="autocomplete">
          <input 
            placeholder="Proveedor"
            value="${gasto.proveedor}"
            oninput="filtrarOpciones(this, ${index}, 'proveedor')"
            onfocus="mostrarTodasOpciones(this, ${index}, 'proveedor')"
          >
          <div class="sugerencias" id="sug-proveedor-${index}"></div>
        </div>

        <div class="autocomplete">
          <input 
            placeholder="Concepto"
            value="${gasto.concepto}"
            oninput="filtrarOpciones(this, ${index}, 'concepto')"
            onfocus="mostrarTodasOpciones(this, ${index}, 'concepto')"
          >
          <div class="sugerencias" id="sug-concepto-${index}"></div>
        </div>

        <input 
          type="text"
          inputmode="numeric"
          placeholder="Valor"
          value="${gasto.valor ? formatearCOP(gasto.valor) : ''}"
          oninput="formatearInput(this, ${index})"
        >

        <button class="clean-btn" onclick="limpiarGasto(${index})">
          Limpiar
        </button>
      </div>
    `;
  });

  renderTotal();
}



//Esta es para los recudos
function agregarRecudo() {
  if (recaudos.length === 0) {
    recaudos.push({
      nequi: "",
      daviplata: "",
      efectivo: "",
      moneda: "",
      caja: ""
    });
    guardarEnLocal(); 
  }
  renderRecudos();
}
function actualizarRecaudo(index, campo, valor, input) {
  // Permite solo números, y el signo - únicamente al inicio
  let limpio = valor.replace(/[^0-9-]/g, "").replace(/(?!^)-/g, "");

  recaudos[index][campo] = limpio;

  // Si es solo "-" o está vacío, no formatear — dejar el input como está
  if (limpio === "-" || limpio === "") {
    input.value = limpio;
    renderTotalRecaudos();
    renderTotalVenta()
    guardarEnLocal();
    return;
  }

  input.value = formatearCOP(limpio);
  renderTotalRecaudos();
  renderTotalVenta()
  guardarEnLocal();
}

function limpiarRecaudo(index) {
  recaudos[index] = {
    nequi: "",
    daviplata: "",
    efectivo: "",
    moneda: "",
    caja: ""
  };
  renderRecudos();
  guardarEnLocal(); 
}
function calcularTotalRecaudos() {
  return recaudos.reduce((sum, r) => {
    return sum +
      (parseFloat(r.nequi) || 0) +
      (parseFloat(r.daviplata) || 0) +
      (parseFloat(r.efectivo) || 0) +
      (parseFloat(r.moneda) || 0) +
      (parseFloat(r.caja) || 0);
  }, 0);
}

function renderTotalRecaudos() {
  document.getElementById("total-recaudos").innerText =
    formatearCOP(calcularTotalRecaudos());
}

            placeholder="Nequi"

            >

        <div class= campo-recaudo>
            <span class="tipo-recaudo">MONEDA: </span>
            <input 
            inputmode="numeric"
            placeholder="Moneda"
            value="${r.moneda ? formatearCOP(r.moneda) : ''}"
            oninput="actualizarRecaudo(${index}, 'moneda', this.value, this)"

        </div>
        <div class= campo-recaudo>
            <span class="tipo-recaudo">CAJA: </span>
            <input 
            
            inputmode="text"
            placeholder="Caja"
            value="${r.caja ? formatearCOP(r.caja) : ''}"
            oninput="actualizarRecaudo(${index}, 'caja', this.value, this)"
            >
        </div>
        <button class="clean-btn" onclick="limpiarRecaudo(${index})">
          Limpiar
        </button>

  });

  renderTotalRecaudos();
}

function renderVenta() {
  const contenedor = document.getElementById("venta");
  contenedor.innerHTML = "";

  if (ventas.length === 0) return;

  ventas.forEach((v, index) => {
    contenedor.innerHTML += `

        <div class= campo-recaudo>
            <span class="tipo-recaudo">1-PANADERIA: </span>
            <input 
            inputmode="numeric"
            placeholder="Panaderia"
            value="${v.panaderia ? formatearCOP(v.panaderia) : ''}"

        <div class= campo-recaudo>
            <span class="tipo-recaudo">2-CAFETERIA: </span>

// 🔹 Actualizar venta
function actualizarVenta(index, campo, valor, input) {
  let numValor = valor.replace(/\D/g, "");
  ventas[index][campo] = numValor;
  input.value = formatearCOP(numValor);
  renderTotalVentaTirilla();
  renderTotalVenta();
  guardarEnLocal();
}

// 🔹 Limpiar venta
function limpiarVenta(index) {
  ventas[index] = { panaderia: "", cafeteria: "", tienda: "", otros: "" };
  renderVenta();
  renderTotalVentaTirilla();
  renderTotalVenta();
  guardarEnLocal();
}

//Encargada de generar el excel con las hojas de gastos y recaudos
function descargarExcel() {
    if (!document.getElementById("fecha").value || !document.getElementById("jornada").value || !document.getElementById("responsable").value) {
        alert("Faltan datos para poder descargar el excel, por favor completa la fecha, jornada y responsable");
        return;
    }
  const fecha = document.getElementById("fecha").value;
  const jornada = document.getElementById("jornada").value;
  const responsable = document.getElementById("responsable").value;

  // — Hoja de Gastos —
  const filasTitulo = [["FECHA", "JORNADA", "RESPONSABLE", "PROVEEDOR", "CONCEPTO", "TOTAL"]];
  const filasGastos = gastos
    .filter(g => g.proveedor || g.concepto || g.valor)
    .map(g => [fecha, jornada, responsable, g.proveedor, g.concepto, parseFloat(g.valor) || 0]);

  const hojaGastos = XLSX.utils.aoa_to_sheet([...filasTitulo, ...filasGastos]);

  // Ancho de columnas
  hojaGastos["!cols"] = [
    { wch: 14 }, { wch: 10 }, { wch: 40 }, { wch: 25 }, { wch: 14 }
  ];

  // — Hoja de Recaudos —
  const tituloRecaudos = [["FECHA", "JORNADA", "RESPONSABLE", "TOTAL_GASTO","NEQUI", "DAVIPLATA", "EFECTIVO", "MONEDA", "CAJA", "PANADERIA", "CAFETERIA", "TIENDA", "OTROS",  "TOTAL_RECAUDO",  "TOTAL_VENTA", "TOTAL_TIRILLA",]];
  const totalesVenta = ventas.reduce((sum, v) => ({
    panaderia: sum.panaderia + (parseFloat(v.panaderia) || 0),
    cafeteria: sum.cafeteria + (parseFloat(v.cafeteria) || 0),
    tienda: sum.tienda + (parseFloat(v.tienda) || 0),
    otros: sum.otros + (parseFloat(v.otros) || 0)
  }), { panaderia: 0, cafeteria: 0, tienda: 0, otros: 0 });

  const filasRecaudos = recaudos.map(r => {
    const nequi    = parseFloat(r.nequi)    || 0;
    const daviplata= parseFloat(r.daviplata)|| 0;
    const efectivo = parseFloat(r.efectivo) || 0;
    const moneda   = parseFloat(r.moneda)   || 0;
    const caja     = parseFloat(r.caja)     || 0;
    const gasto    = calcularTotal() || 0;
    const total_recaudo = nequi + daviplata + efectivo + moneda + caja;
    const total_tirilla = totalesVenta.panaderia + totalesVenta.cafeteria + totalesVenta.tienda + totalesVenta.otros;
    const venta    = gasto + total_recaudo ;

    return [fecha, jornada, responsable,  gasto, nequi, daviplata, efectivo, moneda, caja, totalesVenta.panaderia, totalesVenta.cafeteria, totalesVenta.tienda, totalesVenta.otros, total_recaudo,  venta, total_tirilla,];
  });

  const hojaRecaudos_Venta = XLSX.utils.aoa_to_sheet([...tituloRecaudos, ...filasRecaudos]);
  hojaRecaudos_Venta["!cols"] = [
    { wch: 14 }, { wch: 10 }, { wch: 14 }, { wch: 14 },
    { wch: 14 }, { wch: 14 }, { wch: 14 }, { wch: 14 },
    { wch: 14 }, { wch: 14 }, { wch: 14 }, { wch: 14 },
    { wch: 14 }, { wch: 14 }, { wch: 14 }, { wch: 14 }
  ];

  // — Crear libro y descargar —
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, hojaGastos, "Gastos");
  XLSX.utils.book_append_sheet(wb, hojaRecaudos_Venta, "Recaudos");

  const nombreArchivo = `PANADERIA_${fecha}_${jornada}.xlsx`;
  resetear(); // Limpiar datos después de descargar
  XLSX.writeFile(wb, nombreArchivo);
  
}

//Volver a original luego de descargar
function resetear() {
  localStorage.removeItem("gastos_panaderia");
  gastos   = [{ proveedor: "", concepto: "", valor: "" }];
  recaudos = [];
  ventas   = [];
  setFechaHoy();  
  render();
  renderRecudos();
  renderVenta();
  renderTotalRecaudos();
  renderTotalVentaTirilla();
  renderTotalVenta()
  document.getElementById("jornada").value = "";
  document.getElementById("responsable").value = "";
}

//Parte de localstorage

function guardarEnLocal() {
  localStorage.setItem("gastos_panaderia", JSON.stringify({
    fecha: document.getElementById("fecha").value,
    jornada: document.getElementById("jornada").value,
    responsable: document.getElementById("responsable").value,
    gastos,
    recaudos,
    ventas
  }));
}

function cargarDesdeLocal() {
  const data = localStorage.getItem("gastos_panaderia");
  if (!data) return false;
  const guardado = JSON.parse(data);
  gastos   = guardado.gastos   || [];
  recaudos = guardado.recaudos || [];
  ventas   = guardado.ventas   || [];
  document.getElementById("fecha").value   = guardado.fecha   || new Date().toISOString().split("T")[0];
  document.getElementById("jornada").value = guardado.jornada || "AM";
  document.getElementById("responsable").value = guardado.responsable || "";
  return true;
}

//Nueva funcion para que cuando me equivoco, borrar el gasto
function eliminarGasto(index) {
  const gasto = gastos[index];
  const estaVacio = !gasto.proveedor && !gasto.concepto && !gasto.valor;
  if (estaVacio) {
    if (gastos.length === 1) { limpiarGasto(index); return; }
    gastos.splice(index, 1);
    render();
    guardarEnLocal();
    return;
  }
  // Si tiene datos, pide confirmación
  const confirmado = confirm("¿Seguro que quieres eliminar este gasto?");
  if (!confirmado) return; // canceló — no hace nada

  if (gastos.length === 1) { limpiarGasto(index); return; }
  gastos.splice(index, 1);
  render();
  guardarEnLocal();
}


//Para el total de la venta
function calcularTotalVenta() {
  const gasto = calcularTotal();
  const recaudo = recaudos.reduce((sum, r) => {
     return sum +
      (parseFloat(r.nequi) || 0) +
      (parseFloat(r.daviplata) || 0) +
      (parseFloat(r.efectivo) || 0) +
      (parseFloat(r.moneda) || 0) +
      (parseFloat(r.caja) || 0);
  }, 0);
  return gasto + recaudo;
}

function renderTotalVenta() {
  document.getElementById("total-venta").innerText =
    formatearCOP(calcularTotalVenta());
}

//Para el total de la venta tirilla
function calcularTotalVentaTirilla() {
  return ventas.reduce((sum, v) => {
    return sum +
      (parseFloat(v.panaderia) || 0) +
      (parseFloat(v.cafeteria) || 0) +
      (parseFloat(v.tienda) || 0) +
      (parseFloat(v.otros) || 0);
  }, 0);
}

function renderTotalVentaTirilla() {
  document.getElementById("total-venta-tirilla").innerText =
    formatearCOP(calcularTotalVentaTirilla());
}
setFechaHoy();

if (!cargarDesdeLocal()) {
  agregarGasto(); // solo si no había nada guardado
} else {
  render();
  renderRecudos();
  renderVenta();
  renderTotalVentaTirilla();
  renderTotalVenta();
}
</script>
